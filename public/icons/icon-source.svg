<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#3730a3"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#ring)" stroke-width="2"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#ring)" stroke-width="1"/>

  <!-- Heart-pulse / ECG line (white) -->
  <polyline
    points="80,268 148,268 172,210 196,330 220,200 244,290 268,268 292,268 316,228 340,310 364,268 432,268"
    fill="none"
    stroke="white"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.95"
  />

  <!-- Subtle dot at the peak (accent) -->
  <circle cx="220" cy="200" r="14" fill="#93c5fd" opacity="0.8"/>
</svg>
